<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#4F6EF7" rx="20"/>
  
  <!-- Shopping bag -->
  <path d="M 30 35 L 32 25 L 68 25 L 70 35 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
  <rect x="28" y="35" width="44" height="35" rx="3" fill="#ffffff"/>
  
  <!-- Handle -->
  <path d="M 40 35 Q 40 20, 50 20 Q 60 20, 60 35" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Dollar sign -->
  <text x="50" y="62" font-size="28" font-weight="bold" fill="#4F6EF7" text-anchor="middle">$</text>
  
  <!-- Star accent (top right) -->
  <g transform="translate(75, 22)">
    <polygon points="0,-6 1.5,-2 6,-2 2.5,1.5 4,6 0,2.5 -4,6 -2.5,1.5 -6,-2 -1.5,-2" fill="#FFD700"/>
  </g>
</svg>